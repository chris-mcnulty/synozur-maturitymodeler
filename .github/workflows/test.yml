name: Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  vitest:
    name: Unit + integration tests (Vitest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: orion_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Isolated CI test database — never point at a shared/staging DB.
      DATABASE_URL: postgresql://postgres:password@localhost:5432/orion_test
      GALAXY_OAUTH_CLIENT_IDS: galaxy-test-client
      GALAXY_WEBHOOK_ALLOW_PRIVATE: "true"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 5432 -U postgres; then
              echo "Postgres is ready"
              exit 0
            fi
            echo "Waiting for postgres... ($i)"
            sleep 1
          done
          echo "Postgres did not become ready in time" >&2
          exit 1

      - name: Initialize database schema
        run: npx drizzle-kit push --force

      - name: Run Vitest
        run: npx vitest run --reporter=default
