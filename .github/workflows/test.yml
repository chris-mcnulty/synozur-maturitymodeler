name: Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  vitest:
    name: Unit + integration tests (Vitest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: orion_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Isolated CI test database — never point at a shared/staging DB.
      DATABASE_URL: postgresql://postgres:password@localhost:5432/orion_test
      GALAXY_OAUTH_CLIENT_IDS: galaxy-test-client
      GALAXY_WEBHOOK_ALLOW_PRIVATE: "true"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 5432 -U postgres; then
              echo "Postgres is ready"
              exit 0
            fi
            echo "Waiting for postgres... ($i)"
            sleep 1
          done
          echo "Postgres did not become ready in time" >&2
          exit 1

      - name: Initialize database schema
        run: npx drizzle-kit push --force

      - name: Run Vitest
        run: npx vitest run --reporter=default

  playwright:
    name: End-to-end smoke tests (Playwright)
    runs-on: ubuntu-latest
    needs: vitest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: orion_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/orion_test
      GALAXY_OAUTH_CLIENT_IDS: galaxy-test-client
      GALAXY_WEBHOOK_ALLOW_PRIVATE: "true"
      NODE_ENV: development
      PORT: "5000"
      E2E_BASE_URL: http://localhost:5000
      # Required by server/auth.ts (express-session). CI-only fixed value;
      # never reuse in any non-test environment.
      SESSION_SECRET: ci-e2e-session-secret-not-for-production-use
      # Provisioned non-production admin credentials so the admin
      # "edit question" leg of the smoke suite runs (instead of being skipped).
      # Configure these as repository/organization secrets pointing at a
      # dedicated QA admin account — never reuse production credentials.
      E2E_ADMIN_USERNAME: ${{ secrets.E2E_ADMIN_USERNAME }}
      E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 5432 -U postgres; then
              echo "Postgres is ready"
              exit 0
            fi
            echo "Waiting for postgres... ($i)"
            sleep 1
          done
          echo "Postgres did not become ready in time" >&2
          exit 1

      - name: Initialize database schema
        run: npx drizzle-kit push --force

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Seed minimal E2E fixtures (published individual model)
        run: node scripts/seed-e2e-fixtures.mjs

      - name: Provision E2E admin account
        if: env.E2E_ADMIN_USERNAME != '' && env.E2E_ADMIN_PASSWORD != ''
        run: node scripts/provision-e2e-admin.mjs

      - name: Run Playwright smoke suite
        run: npx playwright test

      - name: Upload Playwright HTML report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 14

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results
          retention-days: 14
